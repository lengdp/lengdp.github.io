    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(180deg, #fdfbf7 0%, #f0f0f0 100%);
            color: #1d1d1f;
            overflow-x: hidden;
            padding-bottom: 50px;
        }

        /* Header样式 - 移动端适配优化 */
        header {
            position: fixed; top: 0; width: 100%; 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(10px);
            padding: 0.8rem 1rem; z-index: 1001;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            height: 56px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
        }
        h1 { font-size: 1rem; font-weight: 600; color: #1d1d1f; }
        
        /* Hero区域 - 移动端适配 */
        .hero {
            position: relative;
            height: 80vh; /* 移动端降低高度，避免占满屏幕 */
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-color: #000;
        }
        .hero img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.9;
            transform: scale(1.0);
            transition: transform 0.2s ease-out;
            will-change: transform;
        }
        .hero-content {
            position: absolute;
            text-align: center;
            color: white;
            z-index: 2;
            pointer-events: none;
            padding: 0 1rem;
        }
        .hero-content h2 {
            font-size: 2rem; /* 移动端缩小标题 */
            font-weight: 700;
            letter-spacing: -1px;
            text-shadow: 0 4px 12px rgba(0,0,0,0.5);
            margin-bottom: 0.5rem;
        }
        .hero-content p {
            font-size: 0.9rem;
            opacity: 0.9;
        }
        .scroll-hint {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 0.8rem;
            opacity: 0.8;
            animation: bounce 2s infinite;
        }

        /* 主容器布局 - 移动端优先 */
        .main-wrapper {
            display: flex;
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            padding: 1rem;
            padding-top: 66px; /* 避开header */
        }
        .container { 
            flex-grow: 1;
            padding: 0; 
            position: relative; 
            max-width: calc(100% - 90px);
            /* 卡片竖向排列 */
            display: flex;
            flex-direction: column;
            gap: 25px; /* 卡片间距，移动端更紧凑 */
        }

        /* 年月锚点 */
        .timeline-month-anchor {
            position: relative;
            top: -70px; 
            left: 0;
            height: 0;
            width: 0;
            visibility: hidden;
        }

        /* 卡片容器 */
        .timeline-item {
            position: relative;
            width: 100%;
            padding: 0;
            opacity: 0; 
            transform: translateY(30px); 
            transition: all 0.6s cubic-bezier(0.2, 0.8, 0.2, 1); /* 更顺滑的入场动画 */
            margin: 0 auto;
            max-width: 750px;
        }
        .timeline-item.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* 卡片核心样式 - 移动端优化 */
        .card {
            background: white; 
            border-radius: 16px; 
            overflow: hidden; 
            box-shadow: 0 4px 16px rgba(0,0,0,0.06); 
            transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); /* 整体顺滑过渡 */
            cursor: pointer;
            width: 100%;
        }
        /* 卡片悬停效果 - 更柔和 */
        .card:hover {
            transform: translateY(-4px); 
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
        }
        .card-inner { 
            padding: 16px 20px 10px; 
            /* 移动端内边距缩小 */
            padding: clamp(12px, 3vw, 20px);
        }
        .date-badge {
            display: inline-block; 
            color: #ff6b6b;
            font-size: 0.7rem; 
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }
        .card-text h3 { 
            color: #1d1d1f; 
            margin-bottom: 8px; 
            font-size: clamp(1rem, 2.5vw, 1.3rem); /* 响应式字体 */
            font-weight: 600;
            letter-spacing: -0.3px;
        }
        .card-text p {
            color: #6e6e73;
            line-height: 1.5;
            font-size: clamp(0.8rem, 2vw, 0.9rem);
            margin-bottom: 12px;
        }

        /* ========== 核心：图片容器（竖图完整显示+顺滑放大） ========== */
        .card-media {
            position: relative;
            width: 100%;
            background: #f8f8f8;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden; /* 保证放大时不溢出 */
        }
        /* 图片样式 - 竖图完整显示 + 顺滑放大 */
        .card-media img {
            display: block;
            width: 100%;
            height: auto; /* 高度自适应，竖图完整显示 */
            object-fit: contain;
            transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1); /* 超顺滑放大 */
            transform-origin: center center; /* 从中心放大 */
        }
        /* 图片悬停放大 - 幅度更小，更自然 */
        .card:hover .card-media img {
            transform: scale(1.03); /* 仅放大3%，不生硬 */
        }

        /* ========== B站视频卡片样式 ========== */
        .card-video {
            position: relative;
            width: 100%;
            /* 视频比例 16:9 */
            aspect-ratio: 16/9;
            background: #000;
        }
        .card-video iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
        /* 视频卡片悬停效果 */
        .card:hover .card-video iframe {
            opacity: 0.98;
        }

        /* 年月导航栏 - 移动端适配优化 */
        .progress-nav {
            position: sticky;
            top: 70px;
            right: 0;
            width: 80px;
            height: fit-content;
            padding-left: 15px;
            border-left: 1px solid #eee;
            z-index: 1000;
        }
        .progress-nav a {
            display: block;
            text-decoration: none;
            color: #86868b;
            font-size: 0.8rem;
            padding: 6px 0;
            transition: all 0.3s ease;
            font-weight: 500;
            white-space: nowrap;
        }
        .progress-nav a:hover, .progress-nav a.active {
            color: #ff6b6b;
            transform: translateX(2px); /* 更小的位移 */
        }
        .progress-nav a.active {
            font-weight: 700;
        }

        /* ========== 移动端适配（768px以下） ========== */
        @media screen and (max-width: 768px) {
            /* Hero区域 */
            .hero {
                height: 60vh;
            }
            /* 主容器 */
            .main-wrapper {
                display: block;
                padding: 0.5rem;
                padding-top: 66px;
            }
            .container {
                max-width: 100%;
                gap: 20px;
            }
            .timeline-item {
                max-width: 100%;
            }
            /* 导航栏改为顶部横向滚动 */
            .progress-nav {
                position: fixed;
                top: 56px; left: 0;
                width: 100%; height: 44px;
                padding: 0 1rem;
                border-left: none;
                border-bottom: 1px solid #eee;
                background: rgba(255, 255, 255, 0.95);
                backdrop-filter: blur(8px);
                white-space: nowrap;
                overflow-x: auto;
                overflow-y: hidden;
                -ms-overflow-style: none;
                scrollbar-width: none;
                z-index: 1000;
            }
            .progress-nav::-webkit-scrollbar {
                display: none;
            }
            .progress-nav a {
                display: inline-block;
                padding: 0 12px;
                line-height: 44px;
                margin: 0;
                font-size: 0.85rem;
            }
            .progress-nav a:hover, .progress-nav a.active {
                color: #ff6b6b;
                transform: none;
                border-bottom: 2px solid #ff6b6b;
            }
            /* 卡片间距 */
            .container {
                padding-top: 10px;
            }
            /* 图片放大幅度更小 */
            .card:hover .card-media img {
                transform: scale(1.02);
            }
        }

        /* 动画优化 */
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0) translateX(-50%);}
            40% {transform: translateY(-8px) translateX(-50%);}
            60% {transform: translateY(-4px) translateX(-50%);}
        }
    </style>
</head>

    // 2. 渲染核心函数
    function renderMedia() {
        try {
            const timelineContainer = document.getElementById('timeline-container');
            const progressNav = document.getElementById('progressNav');
            let timelineHtml = '';

            // 处理年月导航（去重合并）
            const monthAnchorMap = new Map();
            const uniqueMonths = [];

            // 遍历媒体数据（图片+视频）
            mediaList.forEach(item => {
                const yearMonth = item.yearMonth;
                const monthAnchorId = `month-${yearMonth.replace(/\./g, '-')}`;
                const mediaAnchorId = `media-${item.date.replace(/\./g, '-')}`;

                // 年月锚点去重
                if (!monthAnchorMap.has(yearMonth)) {
                    monthAnchorMap.set(yearMonth, monthAnchorId);
                    uniqueMonths.push(yearMonth);
                    timelineHtml += `<div id="${monthAnchorId}" class="timeline-month-anchor"></div>`;
                }

                // ========== 生成卡片（区分图片/视频） ==========
                let mediaContent = '';
                if (item.type === 'image') {
                    // 图片卡片
                    mediaContent = `
                    <div class="card-media">
                        <img class="lozad" data-src="${item.img}" alt="${item.alt}" loading="lazy">
                    </div>
                    `;
                } else if (item.type === 'video') {
                    // B站视频卡片（自动拼接嵌入链接）
                    mediaContent = `
                    <div class="card-video">
                        <iframe src="https://player.bilibili.com/player.html?bvid=${item.bvid}&page=1&autoplay=0" 
                                scrolling="no" 
                                allowfullscreen="true"
                                allow="autoplay; fullscreen; picture-in-picture">
                        </iframe>
                    </div>
                    `;
                }

                // 拼接卡片HTML
                timelineHtml += `
                <div class="timeline-item" id="${mediaAnchorId}">
                    <div class="card">
                        <div class="card-inner">
                            <div class="date-badge">${item.date}</div>
                            <div class="card-text">
                                <h3>${item.title}</h3>
                                <p>${item.desc}</p>
                            </div>
                        </div>
                        ${mediaContent}
                    </div>
                </div>
                `;
            });

            // 生成导航HTML
            let navHtml = '';
            uniqueMonths.forEach(month => {
                const anchorId = monthAnchorMap.get(month);
                navHtml += `<a href="#${anchorId}">${month}</a>`;
            });

            // 插入到页面
            timelineContainer.innerHTML = timelineHtml;
            progressNav.innerHTML = navHtml;

            // 初始化懒加载（仅图片）
            function initLozad() {
                if (typeof lozad === 'undefined') {
                    const script = document.createElement('script');
                    script.src = 'https://cdn.jsdelivr.net/npm/lozad@1.16.0/dist/lozad.min.js';
                    script.onload = () => {
                        const observer = lozad('.lozad', { rootMargin: '200px 0px' });
                        observer.observe();
                    };
                    script.onerror = () => {
                        document.querySelectorAll('.lozad').forEach(img => {
                            img.src = img.dataset.src;
                            img.classList.remove('lozad');
                        });
                    };
                    document.head.appendChild(script);
                } else {
                    const observer = lozad('.lozad', { rootMargin: '200px 0px' });
                    observer.observe();
                }
            }
            initLozad();

            // 卡片入场动画
            function initScrollAnimation() {
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('active');
                        }
                    });
                }, { threshold: 0.1, rootMargin: "0px 0px -30px 0px" });

                document.querySelectorAll('.timeline-item').forEach(item => {
                    observer.observe(item);
                });
            }
            initScrollAnimation();

            // 导航高亮
            function initNavHighlight() {
                const mediaToMonthMap = new Map();
                mediaList.forEach(item => {
                    const mediaAnchorId = `media-${item.date.replace(/\./g, '-')}`;
                    mediaToMonthMap.set(mediaAnchorId, item.yearMonth);
                });

                const navObserver = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            const mediaAnchorId = entry.target.id;
                            const currentMonth = mediaToMonthMap.get(mediaAnchorId);
                            if (currentMonth) {
                                document.querySelectorAll('.progress-nav a').forEach(link => {
                                    link.classList.remove('active');
                                });
                                const activeLink = document.querySelector(`.progress-nav a[href="#month-${currentMonth.replace(/\./g, '-')}"]`);
                                if (activeLink) {
                                    activeLink.classList.add('active');
                                    if (window.innerWidth < 768) {
                                        activeLink.scrollIntoView({ behavior: 'smooth', inline: 'center' });
                                    }
                                }
                            }
                        }
                    });
                }, { rootMargin: "-20% 0px -20% 0px" });

                document.querySelectorAll('.timeline-item').forEach(item => {
                    navObserver.observe(item);
                });
            }
            initNavHighlight();

        } catch (error) {
            console.error('渲染失败：', error);
            document.getElementById('timeline-container').innerHTML = `
                <div style="text-align:center; padding: 50px 1rem; color: #ff6b6b;">
                    <h3>加载失败 😢</h3>
                    <p>错误原因：${error.message}</p>
                </div>
            `;
        }
    }

    // Hero视差效果
    window.addEventListener('scroll', () => {
        const scrollPos = window.scrollY;
        const heroHeight = document.getElementById('hero').offsetHeight;
        const heroBg = document.getElementById('heroBg');
        if (scrollPos < heroHeight) {
            const scale = 1 + (scrollPos / heroHeight) * 0.15; // 更小的缩放，更自然
            heroBg.style.transform = `scale(${scale})`;
        }
    });

    // 页面加载完成后渲染
    document.addEventListener('DOMContentLoaded', () => {
        setTimeout(renderMedia, 100);
    });
</script>
