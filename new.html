<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>呆呆的成长日记 | Puppy Diary</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.4/css/lightbox.min.css">
    <script src="https://cdn.jsdelivr.net/npm/lozad@1.16.0/dist/lozad.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.4/js/lightbox.min.js" defer></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(180deg, #fdfbf7 0%, #f0f0f0 100%);
            color: #1d1d1f;
            overflow-x: hidden;
        }

        /* Header样式 */
        header {
            position: fixed; top: 0; width: 100%; 
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(20px);
            padding: 1rem 2rem; z-index: 1001;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            height: 56px;
        }
        h1 { font-size: 1.2rem; font-weight: 600; color: #1d1d1f; }
        
        /* Hero区域 */
        .hero {
            position: relative;
            height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-color: #000;
        }
        .hero img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.9;
            transform: scale(1.0);
            transition: transform 0.1s linear;
            will-change: transform;
        }
        .hero-content {
            position: absolute;
            text-align: center;
            color: white;
            z-index: 2;
            pointer-events: none;
        }
        .hero-content h2 {
            font-size: 4rem;
            font-weight: 700;
            letter-spacing: -2px;
            text-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .scroll-hint {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 0.9rem;
            opacity: 0.8;
            animation: bounce 2s infinite;
        }

        /* 主容器布局 */
        .main-wrapper {
            display: flex;
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            padding-top: 20px;
        }
        .container { 
            flex-grow: 1;
            padding: 0 20px; 
            position: relative; 
            max-width: calc(100% - 120px);
        }

        /* 年月锚点（仅用于跳转，隐藏） */
        .timeline-month-anchor {
            position: relative;
            top: 0;
            left: 0;
            height: 0;
            width: 0;
            visibility: hidden;
        }

        /* 时间线布局 */
        .timeline { position: relative; padding: 40px 0; }
        .timeline::after {
            content: ''; position: absolute; width: 2px; background-color: #d1d1d6;
            top: 0; bottom: 0; left: 50%; transform: translateX(-50%);
            z-index: 1;
        }
        .timeline-item {
            position: relative; width: 50%; 
            padding: 20px 30px;
            opacity: 0; 
            transform: translateY(50px); 
            transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1); 
            margin-bottom: 20px;
        }
        .timeline-item.active {
            opacity: 1;
            transform: translateY(0);
        }
        .timeline-item::after {
            content: ''; 
            position: absolute; 
            width: 12px; height: 12px;
            background-color: #fff; 
            border: 3px solid #ff6b6b; 
            border-radius: 50%;
            z-index: 2;
            top: 40px;
            left: calc(100% - 6px);
            box-shadow: 0 0 0 4px rgba(255, 107, 107, 0.1);
        }
        .timeline-item.right {
            left: 50%;
        }
        .timeline-item.right::after {
            left: -6px;
        }

        /* 卡片样式 */
        .card {
            background: white; 
            border-radius: 18px; 
            overflow: hidden; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.05); 
            transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow 0.3s ease;
            cursor: pointer;
            width: 100%;
        }
        .card:hover {
            transform: translateY(-6px); 
            box-shadow: 0 16px 40px rgba(0,0,0,0.12);
        }
        .card-inner { padding: 20px 24px 10px; }
        .date-badge {
            display: inline-block; 
            color: #ff6b6b;
            font-size: 0.75rem; font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        .card-text h3 { 
            color: #1d1d1f; 
            margin-bottom: 12px; 
            font-size: 1.4rem; 
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .card-text p {
            color: #6e6e73;
            line-height: 1.6;
            font-size: 0.95rem;
            margin-bottom: 20px;
        }

        /* 图片容器（适配竖版图片完整显示） */
        .card-media {
            position: relative;
            line-height: 0;
            width: 100%;
            min-height: 200px;
            max-height: 500px;
            overflow: hidden;
            background-color: #f5f5f7;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card-media img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* 完整显示图片，不裁剪 */
            transition: transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .card:hover .card-media img {
            transform: scale(1.02);
        }

        /* 导航栏样式（只显示年月，合并相同月份） */
        .progress-nav {
            position: sticky;
            top: 80px;
            right: 0;
            width: 100px;
            height: fit-content;
            padding-left: 20px;
            border-left: 1px solid #d1d1d6;
            z-index: 1000;
        }
        .progress-nav a {
            display: block;
            text-decoration: none;
            color: #86868b;
            font-size: 0.85rem;
            padding: 8px 0;
            transition: all 0.2s;
            font-weight: 500;
            white-space: nowrap;
        }
        .progress-nav a:hover, .progress-nav a.active {
            color: #ff6b6b;
            transform: translateX(4px);
        }
        .progress-nav a.active {
            font-weight: 700;
        }

        /* 移动端适配 */
        @media screen and (max-width: 1024px) {
            .progress-nav {
                width: 80px;
                padding-left: 15px;
            }
            .progress-nav a {
                font-size: 0.8rem;
                padding: 6px 0;
            }
        }
        @media screen and (max-width: 768px) {
            .hero-content h2 { font-size: 2.5rem; }
            .main-wrapper {
                display: block;
                padding-top: 0;
            }
            .container {
                max-width: 100%;
                padding: 0 20px;
            }
            .progress-nav {
                position: fixed;
                top: 56px; left: 0;
                width: 100%; height: 44px;
                padding: 0 20px;
                border-left: none;
                border-bottom: 1px solid rgba(0,0,0,0.05);
                background: rgba(255, 255, 255, 0.85);
                backdrop-filter: blur(20px);
                white-space: nowrap;
                overflow-x: auto;
                overflow-y: hidden;
                -ms-overflow-style: none;
                scrollbar-width: none;
                z-index: 1000;
            }
            .progress-nav::-webkit-scrollbar {
                display: none;
            }
            .progress-nav a {
                display: inline-block;
                padding: 0 14px;
                line-height: 44px;
                margin: 0;
                font-size: 0.9rem;
            }
            .progress-nav a:hover, .progress-nav a.active {
                color: #ff6b6b;
                transform: none;
                border-bottom: 2px solid #ff6b6b;
            }
            .timeline::after {
                left: 30px;
            }
            .timeline-item {
                width: 100%;
                padding-left: 60px;
                padding-right: 10px;
                left: 0 !important;
            }
            .timeline-item::after {
                left: 24px !important;
            }
            .container {
                padding-top: 110px;
            }
            .card-media {
                max-height: 400px;
            }
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0) translateX(-50%);}
            40% {transform: translateY(-10px) translateX(-50%);}
            60% {transform: translateY(-5px) translateX(-50%);}
        }
    </style>
</head>
<body>
<header>
    <h1>🐕 呆呆的成长日记</h1>
</header>

<div class="hero" id="hero">
    <!-- 替换为你的Hero图路径 -->
    <img src="zipImage/hero-bg.jpg" alt="呆呆的成长瞬间" id="heroBg">
    <div class="hero-content">
        <h2>Hello, daidai</h2>
        <p>记录每一个不可复制的瞬间</p>
    </div>
    <div class="scroll-hint">向下滚动 ↓</div>
</div>

<div class="main-wrapper">
    <div class="container">
        <div class="timeline" id="timeline-container">
            <!-- 图片卡片和年月锚点将自动渲染到这里 -->
        </div>
    </div>
    <nav class="progress-nav" id="progressNav">
        <!-- 年月导航将自动渲染到这里 -->
    </nav>
</div>

<script>
    // 1. 渲染图片和导航的核心函数
    function renderImages() {
        try {
            // ========== 替换为你的image-list.json内容 ==========
            // 运行node generate-json.js生成后复制到这里
            const imageList = [
                {
                    "date": "2025.02.21",
                    "yearMonth": "2025.02",
                    "title": "呆呆的成长记录 · 2025.02.21",
                    "desc": "这是呆呆在2025.02.21的珍贵瞬间，记录每一个可爱的时刻～",
                    "img": "zipImage/IMG_20250221_035748.jpg",
                    "alt": "呆呆 2025.02.21"
                },
                {
                    "date": "2025.02.25",
                    "yearMonth": "2025.02",
                    "title": "呆呆的成长记录 · 2025.02.25",
                    "desc": "这是呆呆在2025.02.25的珍贵瞬间，记录每一个可爱的时刻～",
                    "img": "zipImage/IMG_20250225_035748.jpg",
                    "alt": "呆呆 2025.02.25"
                },
                {
                    "date": "2025.03.01",
                    "yearMonth": "2025.03",
                    "title": "呆呆的成长记录 · 2025.03.01",
                    "desc": "这是呆呆在2025.03.01的珍贵瞬间，记录每一个可爱的时刻～",
                    "img": "zipImage/IMG_20250301_035748.jpg",
                    "alt": "呆呆 2025.03.01"
                }
            ];

            const timelineContainer = document.getElementById('timeline-container');
            const progressNav = document.getElementById('progressNav');
            let timelineHtml = '';

            // ========== 步骤1：处理年月导航（去重合并） ==========
            // 存储「年月→第一张图片锚点ID」的映射
            const monthAnchorMap = new Map();
            // 存储去重后的年月列表（保持时间顺序）
            const uniqueMonths = [];

            // 遍历图片，提取年月并去重
            imageList.forEach(item => {
                const yearMonth = item.yearMonth;
                // 生成年月锚点ID（如month-2025-02）
                const monthAnchorId = `month-${yearMonth.replace(/\./g, '-')}`;
                // 生成图片锚点ID（如month-2025-02-21）
                const dateAnchorId = `month-${item.date.replace(/\./g, '-')}`;

                // 仅在第一次遇到该年月时，记录锚点并添加到导航列表
                if (!monthAnchorMap.has(yearMonth)) {
                    monthAnchorMap.set(yearMonth, monthAnchorId);
                    uniqueMonths.push(yearMonth);
                    // 添加年月锚点（用于导航跳转，隐藏）
                    timelineHtml += `<div id="${monthAnchorId}" class="timeline-month-anchor"></div>`;
                }

                // ========== 步骤2：生成图片卡片（显示完整年月日） ==========
                const cardSide = uniqueMonths.indexOf(yearMonth) % 2 === 0 ? 'left' : 'right';
                timelineHtml += `
                <div class="timeline-item ${cardSide}" id="${dateAnchorId}">
                    <div class="card">
                        <div class="card-inner">
                            <div class="date-badge">${item.date}</div>
                            <div class="card-text">
                                <h3>${item.title}</h3>
                                <p>${item.desc}</p>
                            </div>
                        </div>
                        <div class="card-media">
                            <a href="${item.img}" data-lightbox="set" data-title="${item.title}">
                                <img class="lozad" data-src="${item.img}" alt="${item.alt}" width="960" height="1280" loading="lazy">
                            </a>
                        </div>
                    </div>
                </div>
                `;
            });

            // ========== 步骤3：生成合并后的年月导航 ==========
            let navHtml = '';
            uniqueMonths.forEach(month => {
                const anchorId = monthAnchorMap.get(month);
                navHtml += `<a href="#${anchorId}">${month}</a>`;
            });

            // 插入到页面
            timelineContainer.innerHTML = timelineHtml;
            progressNav.innerHTML = navHtml;

            // ========== 初始化懒加载 ==========
            function initLozad() {
                if (typeof lozad === 'undefined') {
                    const script = document.createElement('script');
                    script.src = 'https://cdn.jsdelivr.net/npm/lozad@1.16.0/dist/lozad.min.js';
                    script.onload = () => {
                        const observer = lozad('.lozad', { rootMargin: '200px 0px' });
                        observer.observe();
                    };
                    script.onerror = () => {
                        document.querySelectorAll('.lozad').forEach(img => {
                            img.src = img.dataset.src;
                            img.classList.remove('lozad');
                        });
                    };
                    document.head.appendChild(script);
                } else {
                    const observer = lozad('.lozad', { rootMargin: '200px 0px' });
                    observer.observe();
                }
            }
            initLozad();

            // ========== 初始化卡片滚动动画 ==========
            function initScrollAnimation() {
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('active');
                        }
                    });
                }, { threshold: 0.15, rootMargin: "0px 0px -50px 0px" });

                document.querySelectorAll('.timeline-item').forEach(item => {
                    observer.observe(item);
                });
            }
            initScrollAnimation();

            // ========== 初始化导航高亮（滚动时匹配年月） ==========
            function initNavHighlight() {
                // 构建「图片锚点ID→年月」的映射
                const dateToMonthMap = new Map();
                imageList.forEach(item => {
                    const dateAnchorId = `month-${item.date.replace(/\./g, '-')}`;
                    dateToMonthMap.set(dateAnchorId, item.yearMonth);
                });

                // 监听图片卡片的滚动
                const navObserver = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            const dateAnchorId = entry.target.id;
                            const currentMonth = dateToMonthMap.get(dateAnchorId);
                            if (currentMonth) {
                                // 移除所有导航高亮
                                document.querySelectorAll('.progress-nav a').forEach(link => {
                                    link.classList.remove('active');
                                });
                                // 高亮当前年月导航
                                const activeLink = document.querySelector(`.progress-nav a[href="#month-${currentMonth.replace(/\./g, '-')}"]`);
                                if (activeLink) {
                                    activeLink.classList.add('active');
                                    // 移动端导航自动居中
                                    if (window.innerWidth < 768) {
                                        activeLink.scrollIntoView({ behavior: 'smooth', inline: 'center' });
                                    }
                                }
                            }
                        }
                    });
                }, { rootMargin: "-50% 0px -50% 0px" });

                // 监听所有图片卡片
                document.querySelectorAll('.timeline-item').forEach(item => {
                    navObserver.observe(item);
                });
            }
            initNavHighlight();

        } catch (error) {
            console.error('渲染失败：', error);
            document.getElementById('timeline-container').innerHTML = `
                <div style="text-align:center; padding: 50px; color: #ff6b6b;">
                    <h3>图片加载失败 😢</h3>
                    <p>错误原因：${error.message}</p>
                </div>
            `;
        }
    }

    // 2. Hero区域视差效果
    window.addEventListener('scroll', () => {
        const scrollPos = window.scrollY;
        const heroHeight = document.getElementById('hero').offsetHeight;
        const heroBg = document.getElementById('heroBg');
        if (scrollPos < heroHeight) {
            const scale = 1 + (scrollPos / heroHeight) * 0.3;
            heroBg.style.transform = `scale(${scale})`;
        }
    });

    // 3. 页面加载完成后执行渲染
    document.addEventListener('DOMContentLoaded', () => {
        setTimeout(renderImages, 100);
    });
</script>
</body>
</html>
